<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عبدالعزيز عبدالملك عبدالله الشيخ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #ad976e;
      --gold-light: #c9b48e;
      --green-dark: #1a3a2e;
      --white: #ffffff;
      --off-white: #f9f7f4;
      --text: #2c2c2c;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background-color: var(--off-white);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* top green line */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--green-dark);
    }

    .page-wrapper {
      width: 100%;
      max-width: 860px;
      padding: 60px 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    /* ─── CARD ─── */
    .card-container {
      width: 100%;
      max-width: 620px;
      border-radius: 4px;
      overflow: hidden;
      box-shadow:
        0 2px 8px rgba(0,0,0,0.07),
        0 12px 40px rgba(0,0,0,0.10);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }
    .card-container:hover {
      transform: translateY(-4px);
      box-shadow:
        0 4px 16px rgba(0,0,0,0.08),
        0 20px 56px rgba(0,0,0,0.13);
    }
    .card-container img {
      width: 100%;
      display: block;
    }

    /* ─── DIVIDER ─── */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 460px;
      color: var(--gold);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .divider::after {
      background: linear-gradient(to left, transparent, var(--gold));
    }
    .divider-icon {
      font-size: 18px;
      color: var(--gold);
    }

    /* ─── CONTACT ─── */
    .contact-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.02em;
      padding: 10px 20px;
      border: 1px solid transparent;
      border-radius: 40px;
      transition: all 0.25s ease;
      direction: ltr;
    }
    .contact-item:hover {
      border-color: var(--gold-light);
      background: rgba(173,151,110,0.07);
      color: var(--gold);
    }
    .contact-item svg {
      width: 18px;
      height: 18px;
      fill: var(--gold);
      flex-shrink: 0;
    }

    /* ─── FOOTER ─── */
    footer {
      margin-top: 16px;
      font-size: 12px;
      color: #bbb;
      letter-spacing: 0.04em;
    }
  </style>
</head>
